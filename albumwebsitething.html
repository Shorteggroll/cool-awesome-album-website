<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Album Tracker</title>
    <style>
        /* This centers everything on the screen */
        body {
            background-color: #2c3e50; /* A nicer dark blue/grey */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* This is the "Card" that holds your app */
        .container {
            background-color: #34495e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }

        #album-cover-display {
            border-radius: 10px;
            object-fit: cover; /* Keeps image from looking squished */
            margin-bottom: 15px;
            background-color: #222; /* Placeholder color */
        }

        /* Style the inputs to look modern */
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box; /* Prevents input from overflowing */
        }

        button {
            cursor: pointer;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            background-color: #1db954; /* Spotify Green */
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        .nav-buttons { margin-top: 15px; }
        .delete-btn { background-color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="album-info">Album Title</h1>
        <h3 id="album-count">Artist Name</h3>
        
        <img id="album-cover-display" src="https://via.placeholder.com" alt="Cover" style="height: 200px; width: 200px;">
        
        <p id="listened-status">Not Listened</p>
        <p id="pointer-tracker">0 / 0</p>

        <div class="inputs">
            <input type="text" id="album-name" placeholder="Album Name">
            <input type="text" id="album-artist" placeholder="Artist">
            <input type="text" id="album-cover" placeholder="Cover Image URL">
            <input type="text" id="album-url" placeholder="Spotify URL">
            <button onclick="addNewAlbum()">Add Album</button>
        </div>

        <div class="nav-buttons">
            <button onclick="goLeft()">←</button>
            <button onclick="goRight()">→</button>
            <button onclick="toggleListened()">Toggle Status</button>
            <button class="delete-btn" onclick="deleteCurrentAlbum()">Delete</button>
        </div>
    </div>

    <script src="albumwebsitejs.js"></script>
</body>
</html>
